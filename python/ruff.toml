[lint]
select = [
  "E",    # pycodestyle
  "F",    # pyflakes
  "B",    # bugbear
  "I",    # import sorting
  "SIM",  # simplify
  "UP",   # pyupgrade
  "N",    # naming
  "ARG",  # unused args
  "C90",  # complexity
  "BLE",  # blind except
  "FBT",  # boolean trap
  "TRY",  # exception handling quality
  "PTH",  # pathlib preference
  "RUF",  # Ruff-specific rules
  "PL",   # pylint-derived rules
  "S",    # security-ish checks
  "D",    # docstring presence/style
  "DOC",  # docstring consistency
]
ignore = [
  "D203", # one-blank-line-before-class (conflicts with D211 style families sometimes)
  "D213", # multi-line-summary-second-line (often too bureaucratic)
  "TRY003", # avoid catching Exception (sometimes necessary in CLI tools)
  "FBT001", # avoid assigning to bool (sometimes necessary for flags)
  "D107", # missing docstring in __init__ (often not needed)
]

fixable = ["ALL"]
dummy-variable-rgx = "^_$"

[lint.mccabe]
max-complexity = 8

[lint.per-file-ignores]
"tests/**/*.py" = [
  "S101",   # allow assert in tests
  "D100",   # no module docstring requirement in tests
  "D101",
  "D102",
  "D103",
]
"__init__.py" = ["F401"]
